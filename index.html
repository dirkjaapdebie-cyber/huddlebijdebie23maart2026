<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huddle Dashboard - Ik zal er zijn</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --accent: #0984e3; --wall-bg: #2d3436;
            --green: #00b894; --red: #ff7675; --purple: #a29bfe; --gold: #f1c40f; --teal: #00cec9;
        }
        
        body { 
            margin: 0; font-family: 'Quicksand', sans-serif; 
            background: linear-gradient(135deg, #fff9e6 0%, #f3e5f5 100%);
            background-attachment: fixed; padding-bottom: 80px; color: #2d3436;
        }

        .container { max-width: 1100px; margin: auto; padding: 15px; box-sizing: border-box; }

        .card, .out-box, .video-box { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); 
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.3);
            position: relative;
        }

        .btn-full { 
            min-height: 48px; background: var(--accent); color: white; border: none; padding: 10px;
            border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%;
            text-transform: uppercase; font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
        }
        .btn-sec { background: #dfe6e9; color: #2d3436; font-size: 0.7rem; min-height: 35px; }
        .btn-red { background: var(--red) !important; color: white !important; }

        input { 
            min-height: 48px; padding: 12px; border: 2px solid #ddd; border-radius: 12px; 
            font-size: 16px; width: 100%; box-sizing: border-box; background: white; margin-bottom: 10px;
        }

        .sticky-note { 
            background: #fff; padding: 12px; border-radius: 2px; margin-bottom: 8px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.05); border-left: 4px solid var(--purple);
            font-family: 'Segoe Print', cursive;
        }

        .step-header { text-align: center; margin: 40px 0 20px; font-size: 1.5rem; font-weight: 700; }
        .output-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }

        .tag { 
            background: var(--purple); color: white; padding: 5px 12px; 
            border-radius: 50px; font-size: 0.65rem; font-weight: bold;
            position: absolute; top: -12px; left: 15px; z-index: 2;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- NIEUWE VIDEO HELEMAAL BOVENAAN -->
    <div class="video-box">
        <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:15px; background:#000;">
            <iframe style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" 
                src="https://www.youtube.com/embed/oxHINji3eDs" allowfullscreen>
            </iframe>
        </div>
        <p style="text-align: center; font-weight: bold; margin-top: 10px;">🎵 Sela - Ik zal er zijn</p>
    </div>

    <!-- CONTROLPANEEL MET VRAGEN -->
    <div class="card" style="border-top: 8px solid var(--accent);">
        <h2 id="huidige-vraag" style="text-align: center; color: var(--accent); font-size: 1.1rem; min-height: 60px; display: flex; align-items: center; justify-content: center; padding: 0 10px;">Laden...</h2>
        
        <div id="input-sectie" style="display:none; margin-top: 15px;">
            <input type="text" id="i-antwoord" placeholder="Deel je gedachte..." onkeydown="if(event.key==='Enter')stuurAntwoord()">
            <button class="btn-full" onclick="stuurAntwoord()">Verstuur naar Prikbord</button>
        </div>

        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 8px;">
            <button id="btn-volgende" class="btn-full" onclick="volgendeStap()" style="background: var(--wall-bg);">Volgende stap ➔</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-full btn-sec" onclick="vorigeStap()">⬅ Terug</button>
                <button class="btn-full btn-sec btn-red" onclick="resetPrikbord()">Reset Prikbord 📍</button>
            </div>
        </div>
    </div>

    <!-- PRIKBORD -->
    <div id="prikbord-sectie" style="display:none;">
        <h2 class="step-header">📍 Het Groeps-Prikbord</h2>
        <div class="output-container" id="prikbord-grid"></div>
        
        <!-- OUDE VIDEO ONDER HET PRIKBORD -->
        <div class="video-box" style="margin-top: 40px;">
            <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:15px; background:#000;">
                <iframe style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" 
                    src="https://www.youtube.com/embed/cq6quKlwQy8?start=1479" allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin: 40px 0;">
        <img src="de-schapen-van-aart-van-den-brandhof-hier-grazend-op-de-edese-heide.jpg" alt="Schapen" style="width:100%; border-radius:20px;">
    </div>

</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCSoSYmzdcse87_E-p6K-DMn_NbQWFnPNU", 
        authDomain: "huddlebijdebie26jan.firebaseapp.com", 
        databaseURL: "https://huddlebijdebie26jan-default-rtdb.europe-west1.firebasedatabase.app/", 
        projectId: "huddlebijdebie26jan" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const diepeVragen = [
        "1. Als God je ziet op momenten dat niemand anders kijkt, verandert dat hoe je bidt?",
        "2. Hoe verandert het jouw rust als je beseft dat God simpelweg kijkt naar wie je bént?",
        "3. Kun jij geloven dat God met plezier naar je kijkt als je alleen maar stil bij Hem bent?",
        "4. Wanneer heb jij voor het laatst ervaren dat God heel specifiek jóuw situatie zag?",
        "5. Als God aanwezig is bij de vaat of het strikken van je schoenen, wat zegt dat over de waarde van jouw 'gewone' dag? Herken je dit?",
        "6. Wat zou je God op dit moment willen vragen?"
    ];

    db.ref('h/stap').on('value', s => {
        const stap = s.val() || 0;
        const vDisplay = document.getElementById('huidige-vraag');
        const iSectie = document.getElementById('input-sectie');
        const prikbord = document.getElementById('prikbord-sectie');
        const btnV = document.getElementById('btn-volgende');

        if (stap === 0) {
            vDisplay.innerText = "Klaar voor de start? ☕";
            iSectie.style.display = 'none'; prikbord.style.display = 'none';
            btnV.innerText = "Start Vragen ➔";
        } else if (stap <= 6) {
            vDisplay.innerText = diepeVragen[stap-1];
            iSectie.style.display = 'block'; prikbord.style.display = 'none';
            btnV.innerText = (stap === 6) ? "Bekijk Prikbord ➔" : "Volgende Vraag ➔";
        } else {
            vDisplay.innerText = "📍 Prikbord & Reflectie";
            iSectie.style.display = 'none'; prikbord.style.display = 'block';
            btnV.innerText = "Sessie Afronden ✨";
            laadPrikbord();
        }
    });

    function volgendeStap() { db.ref('h/stap').transaction(c => (c || 0) + 1); }
    function vorigeStap() { db.ref('h/stap').transaction(c => Math.max(0, (c || 0) - 1)); }
    function resetPrikbord() { if(confirm("Alleen het prikbord wissen?")) { db.ref('h/antwoorden').remove(); db.ref('h/stap').set(0); } }

    function stuurAntwoord() {
        const el = document.getElementById('i-antwoord');
        db.ref('h/stap').once('value', s => {
            const stap = s.val();
            if(el.value.trim() && stap > 0) {
                db.ref(`h/antwoorden/v${stap}`).push(el.value);
                el.value = ""; el.placeholder = "Verstuurd! ✅";
                setTimeout(() => { el.placeholder = "Deel je gedachte..."; }, 2000);
            }
        });
    }

    function laadPrikbord() {
        const grid = document.getElementById('prikbord-grid'); grid.innerHTML = "";
        const labels = ["BINNENKAMER", "HARTSLAG", "STILTE", "DE HERDER", "ALLEDAG", "VRAGEN"];
        const colors = ["#a29bfe", "#74b9ff", "#55efc4", "#fab1a0", "#f1c40f", "#00cec9"];
        
        for(let i=1; i<=6; i++) {
            const box = document.createElement('div'); box.className = 'out-box';
            box.style.borderTop = `6px solid ${colors[i-1]}`;
            box.innerHTML = `<span class="tag" style="background:${colors[i-1]}; color:${(i==5||i==6)?'#000':'#fff'}">${labels[i-1]}</span>`;
            db.ref(`h/antwoorden/v${i}`).on('value', snap => {
                box.querySelectorAll('.sticky-note').forEach(n => n.remove());
                if(snap.exists()) snap.forEach(c => {
                    const d = document.createElement('div'); d.className = 'sticky-note';
                    d.innerText = c.val(); box.appendChild(d);
                });
            });
            grid.appendChild(box);
        }
    }
</script>
</body>
</html>
